<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lưu dữ liệu lên Firebase</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 300px; padding: 8px; }
        button { padding: 10px 15px; background-color: #0288d1; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #01579b; }
    </style>
</head>
<body>

    <h2>Đăng ký nhận thông tin từ website</h2>
    
    <div class="form-group">
        <label for="username">Họ và tên:</label>
        <input type="text" id="username" placeholder="Nhập tên của bạn">
    </div>
    
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Nhập email">
    </div>

    <button id="btnSave">Gửi dữ liệu</button>

    <script type="module">
        // 1. Import các hàm cần thiết từ Firebase SDK gán qua CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. Cấu hình Firebase của bạn (Thay thế bằng đoạn mã của bạn ở Bước 3)
        const firebaseConfig = {
            apiKey: "AIzaSyCjZn1Fro74tMJIcSYrowJN9a3nqEDo1Qo",
            authDomain: "haryqlcv.firebaseapp.com",
            projectId: "haryqlcv",
            storageBucket: "haryqlcv.firebasestorage.app",
            messagingSenderId: "441137291578",
            appId: "1:441137291578:web:dad9ebe93c58f34c5bf003"
        };

        // 3. Khởi tạo Firebase và Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. Lắng nghe sự kiện click nút để lưu dữ liệu
        document.getElementById('btnSave').addEventListener('click', async () => {
            const name = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            if (name === "" || email === "") {
                alert("Vui lòng điền đầy đủ thông tin!");
                return;
            }

            try {
                // Thêm một document mới vào collection tên là "users"
                const docRef = await addDoc(collection(db, "users"), {
                    fullName: name,
                    email: email,
                    createdAt: new Date() // Lưu thời gian tạo
                });
                
                alert("Dữ liệu đã được lưu thành công! ID: " + docRef.id);
                
                // Xóa form sau khi lưu thành công
                document.getElementById('username').value = "";
                document.getElementById('email').value = "";
                
            } catch (error) {
                console.error("Lỗi khi lưu dữ liệu: ", error);
                alert("Đã xảy ra lỗi, vui lòng kiểm tra console.");
            }
        });
    </script>
</body>
</html>
